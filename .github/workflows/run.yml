name: Try create OCI instance

on:
  schedule:
    - cron: '*/5 * * * *'  # toutes les 5 min
  workflow_dispatch:        # bouton run manuel

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-dev --no-interaction

      - name: Write private key
        env:
          PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "=== First line ==="
          head -1 ~/.oci/oci_api_key.pem
          echo "=== Last line ==="
          tail -1 ~/.oci/oci_api_key.pem
          echo "=== Line count ==="
          wc -l ~/.oci/oci_api_key.pem
          echo "=== Validation ==="
          openssl pkey -in ~/.oci/oci_api_key.pem -noout && echo "KEY OK" || echo "KEY INVALID"

      - name: Run script
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /home/runner/.oci/oci_api_key.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_MAX_INSTANCES: 1
        run: php ./index.php
